<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo-Racer</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; color: #fff; font-size: 1.2rem; text-shadow: 2px 2px #f00; z-index: 10; pointer-events: none; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; color: #fff; }
        .hidden { display: none !important; }
        .btn-start { background: #f00; color: #fff; border: none; padding: 20px 50px; font-size: 1.5rem; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .controls { position: absolute; bottom: 10px; width: 100%; height: 30%; display: flex; z-index: 15; }
        .touch-half { width: 50%; height: 100%; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div id="hud">
        <span>SCORE: <span id="score">0</span></span>
        <span>LEVEL: <span id="lvl">1</span></span>
    </div>

    <div id="menu" class="overlay">
        <h1 style="color: #f00; font-size: 3rem;">CHAOS DRIVER</h1>
        <p>A ESTRADA ESTÁ CHEIA. SOBREVIVE.</p>
        <button class="btn-start" onclick="startGame()">ENTRAR NO CAOS</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="touch-half" id="lZone"></div>
        <div class="touch-half" id="rZone"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const lvlEl = document.getElementById('lvl');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let score = 0;
        let level = 1;
        let speed = 6;
        let player = { x: canvas.width/2 - 20, y: canvas.height - 150, w: 40, h: 75 };
        let cars = [];
        let moveLeft = false;
        let moveRight = false;

        // Controlos simplificados: Toca na metade esquerda ou direita do ecrã
        document.getElementById('lZone').ontouchstart = (e) => { e.preventDefault(); moveLeft = true; };
        document.getElementById('lZone').ontouchend = () => moveLeft = false;
        document.getElementById('rZone').ontouchstart = (e) => { e.preventDefault(); moveRight = true; };
        document.getElementById('rZone').ontouchend = () => moveRight = false;

        function startGame() {
            document.getElementById('menu').classList.add('hidden');
            score = 0; level = 1; speed = 6; cars = [];
            gameActive = true;
            update();
        }

        function spawnWave() {
            const numLanes = 5; // Aumentei para 5 faixas para ser mais apertado
            const laneWidth = canvas.width / numLanes;
            const safeLane = Math.floor(Math.random() * numLanes); // Uma faixa fica livre

            for(let i = 0; i < numLanes; i++) {
                if(i !== safeLane) {
                    cars.push({
                        x: i * laneWidth + (laneWidth/2 - 20),
                        y: -100,
                        w: 40,
                        h: 75,
                        s: speed + (Math.random() * 2)
                    });
                }
            }
        }

        function update() {
            if(!gameActive) return;

            if(moveLeft && player.x > 5) player.x -= (speed + 2);
            if(moveRight && player.x < canvas.width - 45) player.x += (speed + 2);

            // Spawn de ondas de carros (carros por todo o lado)
            if(cars.length === 0 || cars[cars.length-1].y > 250) {
                spawnWave();
            }

            cars.forEach((car, i) => {
                car.y += car.s;

                // Colisão
                if (player.x < car.x + car.w && player.x + player.w > car.x &&
                    player.y < car.y + car.h && player.y + player.h > car.y) {
                    gameOver();
                }

                // Remove e pontua
                if(car.y > canvas.height) {
                    cars.splice(i, 1);
                    score++;
                    scoreEl.innerText = score;
                    if(score % 20 === 0) {
                        level++;
                        speed += 1;
                        lvlEl.innerText = level;
                    }
                }
            });

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            // Asfalto
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Linhas de faixa
            ctx.strokeStyle = '#333';
            ctx.setLineDash([20, 40]);
            for(let i=1; i<5; i++) {
                ctx.beginPath();
                ctx.moveTo(i * (canvas.width/5), 0);
                ctx.lineTo(i * (canvas.width/5), canvas.height);
                ctx.stroke();
            }

            // Jogador (Amarelo Neon)
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffff00';
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Inimigos (Vermelho Escuro)
            ctx.shadowColor = '#ff0000';
            ctx.fillStyle = '#b30000';
            cars.forEach(car => {
                ctx.fillRect(car.x, car.y, car.w, car.h);
            });
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('menu').classList.remove('hidden');
            document.querySelector('#menu h1').innerText = "COLISÃO!";
            document.querySelector('#menu p').innerText = "Score Final: " + score;
        }

        draw();
    </script>
</body>
</html>
