<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo Racer: Insane</title>
    <style>
        :root { --neon: #00ff41; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
        canvas { display: block; }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 10; }
        .hidden { display: none !important; }
        
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 1.2rem; z-index: 5; color: var(--neon); text-shadow: 0 0 5px var(--neon); }
        
        .btn-start { background: transparent; border: 2px solid var(--neon); color: var(--neon); padding: 15px 50px; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 15px var(--neon); text-transform: uppercase; }
        
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .touch-zone { width: 45%; height: 150px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,65,0.2); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--neon); }
    </style>
</head>
<body>

    <div id="hud">
        <span>LVL: <span id="lvl">1</span></span>
        <span>PTS: <span id="score">0</span></span>
        <span>MAX: <span id="best">0</span></span>
    </div>

    <div id="menu" class="overlay">
        <h1 style="color: var(--neon); font-size: 2.5rem;">MODO INSANO</h1>
        <p>A velocidade aumenta SEM LIMITE.</p>
        <button class="btn-start" onclick="startGame()">INICIAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div class="controls">
        <div class="touch-zone" id="lBtn">◀</div>
        <div class="touch-zone" id="rBtn">▶</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const lvlEl = document.getElementById('lvl');
        const bestEl = document.getElementById('best');
        const menu = document.getElementById('menu');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0, level = 1, highscore = localStorage.getItem('insaneHighscore') || 0;
        let gameActive = false, speed = 5, moveLeft = false, moveRight = false;
        let player = { x: 0, y: canvas.height - 120, w: 45, h: 80 };
        let obstacles = [];
        bestEl.innerText = highscore;

        // Controlos
        const handleInput = (side, active) => { if(side === 'l') moveLeft = active; else moveRight = active; };
        document.getElementById('lBtn').ontouchstart = () => handleInput('l', true);
        document.getElementById('lBtn').ontouchend = () => handleInput('l', false);
        document.getElementById('rBtn').ontouchstart = () => handleInput('r', true);
        document.getElementById('rBtn').ontouchend = () => handleInput('r', false);

        function startGame() {
            menu.classList.add('hidden');
            score = 0; level = 1; speed = 6; obstacles = [];
            player.x = canvas.width / 2 - 22;
            gameActive = true;
            loop();
        }

        function spawnObstacles() {
            const laneWidth = canvas.width / 4;
            // Chance de spawnar 1 ou 2 carros ao mesmo tempo para fechar o caminho
            const numToSpawn = Math.random() > 0.8 ? 2 : 1;
            const usedLanes = [];

            for(let i=0; i < numToSpawn; i++) {
                let lane = Math.floor(Math.random() * 4);
                if(!usedLanes.includes(lane)) {
                    usedLanes.push(lane);
                    obstacles.push({
                        x: lane * laneWidth + (laneWidth/2 - 22),
                        y: -100,
                        w: 45,
                        h: 80,
                        s: speed + (Math.random() * 2)
                    });
                }
            }
        }

        function update() {
            if(!gameActive) return;

            if(moveLeft && player.x > 5) player.x -= (speed + 2);
            if(moveRight && player.x < canvas.width - 50) player.x += (speed + 2);

            // Frequência de obstáculos aumenta com o nível
            if(Math.random() < 0.03 + (level * 0.005)) spawnObstacles();

            obstacles.forEach((obs, i) => {
                obs.y += obs.s;

                // Colisão (Hitbox levemente menor que o desenho para ser justo)
                if (player.x + 5 < obs.x + obs.w - 5 && player.x + player.w - 5 > obs.x + 5 &&
                    player.y + 5 < obs.y + obs.h - 5 && player.y + player.h - 5 > obs.y + 5) {
                    endGame();
                }

                if(obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreEl.innerText = score;
                    if(score % 10 === 0) {
                        level++;
                        speed += 1.2;
                        lvlEl.innerText = level;
                        document.documentElement.style.setProperty('--neon', level % 2 === 0 ? '#ff003c' : '#00ff41');
                    }
                }
            });
        }

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrada Insana
            ctx.strokeStyle = 'rgba(0, 255, 65, 0.1)';
            for(let i=1; i<4; i++) {
                ctx.beginPath();
                ctx.moveTo(i * (canvas.width/4), 0);
                ctx.lineTo(i * (canvas.width/4), canvas.height);
                ctx.stroke();
            }

            // Jogador
            ctx.shadowBlur = 15;
            ctx.shadowColor = getComputedStyle(document.documentElement).getPropertyValue('--neon');
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Inimigos
            ctx.shadowColor = '#ff003c';
            ctx.fillStyle = '#ff003c';
            obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h));
            ctx.shadowBlur = 0;
        }

        function endGame() {
            gameActive = false;
            if(score > highscore) {
                highscore = score;
                localStorage.setItem('insaneHighscore', highscore);
                bestEl.innerText = highscore;
            }
            menu.classList.remove('hidden');
            menu.querySelector('h1').innerText = "DESTRUÍDO!";
        }

        function loop() {
            if(!gameActive) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        draw();
    </script>
</body>
</html>
