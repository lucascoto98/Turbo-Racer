<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo-Racer</title>
    <link rel="icon" href="https://fav.farm/🏎️" />
    <style>
        /* Bloqueia comportamentos chatos de browser no tlm */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        body { 
            margin: 0; 
            background: #050505; 
            overflow: hidden; 
            font-family: 'Arial Black', sans-serif; 
            touch-action: none; 
        }

        canvas { display: block; }

        /* HUD - Pontuação */
        #hud { 
            position: absolute; 
            top: 15px; 
            width: 100%; 
            display: flex; 
            justify-content: space-around; 
            color: #fff; 
            font-size: 1.2rem; 
            text-shadow: 2px 2px #f00; 
            z-index: 10; 
            pointer-events: none; 
        }

        /* Menus */
        .overlay { 
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.9); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 20; 
            color: #fff; 
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }

        .btn-start { 
            background: #f00; 
            color: #fff; 
            border: none; 
            padding: 20px 50px; 
            font-size: 1.5rem; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 5px #900;
            transition: 0.1s;
        }

        .btn-start:active { 
            transform: translateY(4px); 
            box-shadow: 0 2px #900; 
        }

        /* Zonas de Toque Invisíveis */
        .controls { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            height: 80%; 
            display: flex; 
            z-index: 15; 
        }

        .touch-half { 
            width: 50%; 
            height: 100%; 
            -webkit-tap-highlight-color: transparent; 
        }
    </style>
</head>
<body>

    <div id="hud">
        <span>SCORE: <span id="score">0</span></span>
        <span>LEVEL: <span id="lvl">1</span></span>
    </div>

    <div id="menu" class="overlay">
        <h1 style="color: #f00; font-size: 3rem; margin: 0;">TURBO RACER</h1>
        <p>A ESTRADA É UM CAOS. NÃO BATAS.</p>
        <button class="btn-start" onclick="startGame()">ENTRAR NO CAOS</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="touch-half" id="lZone"></div>
        <div class="touch-half" id="rZone"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const lvlEl = document.getElementById('lvl');
        
        // Ajusta o tamanho do canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let gameActive = false;
        let score = 0;
        let level = 1;
        let speed = 6;
        let player = { x: 0, y: 0, w: 40, h: 75 };
        let cars = [];
        let moveLeft = false;
        let moveRight = false;

        // Controlos Mobile
        const lZone = document.getElementById('lZone');
        const rZone = document.getElementById('rZone');

        lZone.addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft = true; });
        lZone.addEventListener('touchend', () => moveLeft = false);
        rZone.addEventListener('touchstart', (e) => { e.preventDefault(); moveRight = true; });
        rZone.addEventListener('touchend', () => moveRight = false);

        // Controlos PC
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft" || e.key === "a") moveLeft = true;
            if (e.key === "ArrowRight" || e.key === "d") moveRight = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === "ArrowLeft" || e.key === "a") moveLeft = false;
            if (e.key === "ArrowRight" || e.key === "d") moveRight = false;
        });

        function startGame() {
            document.getElementById('menu').classList.add('hidden');
            score = 0; 
            level = 1; 
            speed = 6; 
            cars = [];
            player.x = canvas.width / 2 - 20;
            player.y = canvas.height - 150;
            scoreEl.innerText = score;
            lvlEl.innerText = level;
            gameActive = true;
            update();
        }

        function spawnWave() {
            const numLanes = 5;
            const laneWidth = canvas.width / numLanes;
            const safeLane = Math.floor(Math.random() * numLanes);

            for(let i = 0; i < numLanes; i++) {
                if(i !== safeLane) {
                    cars.push({
                        x: i * laneWidth + (laneWidth/2 - 20),
                        y: -100,
                        w: 40,
                        h: 75,
                        s: speed + (Math.random() * 2)
                    });
                }
            }
        }

        function update() {
            if(!gameActive) return;

            // Movimento suave
            const moveSpeed = speed + 4;
            if(moveLeft && player.x > 5) player.x -= moveSpeed;
            if(moveRight && player.x < canvas.width - player.w - 5) player.x += moveSpeed;

            // Gerar inimigos
            if(cars.length === 0 || cars[cars.length-1].y > 350) {
                spawnWave();
            }

            // Lógica dos carros inimigos
            for (let i = cars.length - 1; i >= 0; i--) {
                let car = cars[i];
                car.y += car.s;

                // Colisão (Hitbox ligeiramente menor para ser justo)
                if (player.x + 5 < car.x + car.w - 5 && 
                    player.x + player.w - 5 > car.x + 5 &&
                    player.y + 5 < car.y + car.h - 5 && 
                    player.y + player.h - 5 > car.y + 5) {
                    gameOver();
                    return;
                }

                // Pontuar e limpar
                if(car.y > canvas.height) {
                    cars.splice(i, 1);
                    score++;
                    scoreEl.innerText = score;
                    
                    // Subir de nível
                    if(score % 20 === 0) {
                        level++;
                        speed += 0.7;
                        lvlEl.innerText = level;
                    }
                }
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            // Fundo
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Marcas da Estrada
            ctx.strokeStyle = '#1a1a1a';
            ctx.setLineDash([30, 50]);
            ctx.lineWidth = 2;
            for(let i=1; i<5; i++) {
                ctx.beginPath();
                ctx.moveTo(i * (canvas.width/5), 0);
                ctx.lineTo(i * (canvas.width/5), canvas.height);
                ctx.stroke();
            }

            // Brilho Neon para o Jogador
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00f2ff';
            ctx.fillStyle = '#00f2ff';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Brilho Neon para Inimigos
            ctx.shadowColor = '#ff0044';
            ctx.fillStyle = '#ff0044';
            cars.forEach(car => {
                ctx.fillRect(car.x, car.y, car.w, car.h);
            });
            
            ctx.shadowBlur = 0; // Reset para performance
        }

        function gameOver() {
            gameActive = false;
            const menu = document.getElementById('menu');
            menu.classList.remove('hidden');
            menu.querySelector('h1').innerText = "FATAL ERROR";
            menu.querySelector('p').innerText = "Score Final: " + score;
            menu.querySelector('.btn-start').innerText = "RECORRER";
        }

        // Desenho inicial
        draw();
    </script>
</body>
</html>
